<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#ff4444"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#880000"/>
      <stop offset="50%" stop-color="#ff0000"/>
      <stop offset="100%" stop-color="#880000"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="rounded">
      <rect width="64" height="64" rx="12" ry="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" ry="12" fill="url(#bg)"/>

  <!-- Subtle red glow ring -->
  <ellipse cx="32" cy="32" rx="26" ry="22" fill="none" stroke="#ff0000" stroke-width="0.4" opacity="0.25"/>

  <!-- Glow behind text -->
  <text x="32" y="36" font-family="Arial Black, Arial" font-weight="900" font-size="26" text-anchor="middle" fill="#ff0000" opacity="0.35" filter="url(#glow)">CL</text>

  <!-- Main CL text -->
  <text x="32" y="36" font-family="Arial Black, Arial" font-weight="900" font-size="26" text-anchor="middle" fill="url(#textGrad)">CL</text>

  <!-- Red accent bar -->
  <rect x="10" y="46" width="44" height="3" rx="1.5" fill="url(#barGrad)"/>

  <!-- Red corner dots -->
  <circle cx="10" cy="47.5" r="1.5" fill="#ff0000"/>
  <circle cx="54" cy="47.5" r="1.5" fill="#ff0000"/>

  <!-- Top thin red line accent -->
  <rect x="20" y="12" width="24" height="1.5" rx="0.75" fill="#ff0000" opacity="0.6"/>
</svg>
